<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>RAG Admin Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap');
  *{{box-sizing:border-box;margin:0;padding:0}}
  body{{
    font-family:'IBM Plex Mono',monospace;
    background:#0a0a0a;color:#e0e0e0;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
  }}
  .box{{
    background:#141414;border:1px solid #222;border-radius:10px;
    padding:40px;width:360px;
  }}
  h1{{color:#f0a500;font-size:1rem;letter-spacing:.12em;text-transform:uppercase;margin-bottom:28px}}
  label{{font-size:.75rem;color:#666;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px}}
  input{{
    width:100%;background:#0a0a0a;border:1px solid #2a2a2a;color:#e0e0e0;
    padding:10px 12px;border-radius:6px;font-family:inherit;font-size:.875rem;
    margin-bottom:18px;outline:none;transition:border-color .2s;
  }}
  input:focus{{border-color:#f0a500}}
  button{{
    width:100%;background:#f0a500;border:none;color:#000;
    padding:12px;border-radius:6px;cursor:pointer;font-family:inherit;
    font-size:.85rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    transition:opacity .15s;
  }}
  button:hover{{opacity:.85}}
  .err{{color:#f66;font-size:.8rem;margin-top:14px;text-align:center}}
</style>
</head>
<body>
<div class="box">
  <h1>⬡ Admin Login</h1>
  <form method="POST" action="/admin/login">
    <label>Username</label>
    <input type="text" name="username" autofocus/>
    <label>Password</label>
    <input type="password" name="password"/>
    <button type="submit">Sign In</button>
    {error}
  </form>
</div>
</body>
</html>
