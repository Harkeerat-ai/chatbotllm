<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Analytics &mdash; Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  *, *::before, *::after {{ box-sizing: border-box; margin: 0; padding: 0; }}
  body {{ font-family: 'IBM Plex Mono', monospace; background: #0d0d0d; color: #e8e8e8; padding: 24px; }}
  h1 {{ font-size: 22px; margin-bottom: 20px; color: #f0a500; }}
  nav {{ margin-bottom: 24px; }}
  nav a {{ color: #f0a500; text-decoration: none; margin-right: 20px; font-size: 14px; }}
  nav a:hover {{ text-decoration: underline; }}
  .stats {{ display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }}
  .stat-card {{ background: #161616; border: 1px solid #2a2a2a; border-radius: 12px; padding: 16px 24px; min-width: 160px; }}
  .stat-card .label {{ font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; }}
  .stat-card .value {{ font-size: 28px; font-weight: 600; margin-top: 4px; }}
  .chart-row {{ display: flex; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }}
  .chart-box {{ background: #161616; border: 1px solid #2a2a2a; border-radius: 12px; padding: 20px; flex: 1; min-width: 300px; }}
  .chart-box h3 {{ font-size: 14px; color: #888; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }}
  .chart-box canvas {{ max-height: 240px; }}
  .days-selector {{ margin-bottom: 20px; }}
  .days-selector a {{ color: #888; text-decoration: none; margin-right: 12px; font-size: 13px; }}
  .days-selector span.active {{ color: #f0a500; font-weight: 600; }}
  table {{ width: 100%; border-collapse: collapse; font-size: 13px; }}
  th, td {{ text-align: left; padding: 10px 12px; border-bottom: 1px solid #2a2a2a; }}
  th {{ color: #888; text-transform: uppercase; letter-spacing: 1px; font-size: 11px; }}
  td {{ color: #e8e8e8; }}
</style>
</head>
<body>
<nav>
  <a href="/admin">&larr; Dashboard</a>
  <a href="/admin/analytics">Analytics</a>
  <a href="/admin">Tracking</a>
</nav>

<h1>Analytics</h1>

<div class="days-selector">
  {days_links}
</div>

<div class="stats">
  <div class="stat-card">
    <div class="label">Total Chats</div>
    <div class="value">{total_chats}</div>
  </div>
  <div class="stat-card">
    <div class="label">Total Leads</div>
    <div class="value">{total_leads}</div>
  </div>
  <div class="stat-card">
    <div class="label">Avg Latency (ms)</div>
    <div class="value">{avg_latency}</div>
  </div>
</div>

<div class="chart-row">
  <div class="chart-box">
    <h3>Events Over Time</h3>
    <canvas id="eventsChart"></canvas>
  </div>
  <div class="chart-box">
    <h3>Event Breakdown</h3>
    <canvas id="breakdownChart"></canvas>
  </div>
</div>

<div class="chart-row">
  <div class="chart-box">
    <h3>Latency Trend (ms)</h3>
    <canvas id="latencyChart"></canvas>
  </div>
  <div class="chart-box">
    <h3>Per-Brand Breakdown</h3>
    <table>
      <thead><tr><th>Brand</th><th>Chats</th><th>Leads</th><th>Avg Latency</th></tr></thead>
      <tbody id="brandTableBody"></tbody>
    </table>
  </div>
</div>

<script>
(function() {{
  var detailed = {detailed_json};
  var brands = {brands_json};

  var allDates = new Set();
  var eventsByDate = {{}};
  var latByDate = {{}};
  var breakdownCounts = {{}};

  brands.forEach(function(slug) {{
    var d = detailed[slug];
    if (!d) return;
    d.chats_over_time.forEach(function(pt) {{
      allDates.add(pt.date);
      eventsByDate[pt.date] = (eventsByDate[pt.date] || 0) + pt.count;
    }});
    d.latency_trend.forEach(function(pt) {{
      if (!latByDate[pt.date]) latByDate[pt.date] = [];
      latByDate[pt.date].push(pt.count);
    }});
    d.event_breakdown.forEach(function(b) {{
      breakdownCounts[b.event_type] = (breakdownCounts[b.event_type] || 0) + b.count;
    }});
  }});

  var sortedDates = Array.from(allDates).sort();
  var eventCounts = sortedDates.map(function(d) {{ return eventsByDate[d] || 0; }});
  var avgLatencies = sortedDates.map(function(d) {{
    var vals = latByDate[d] || [];
    return vals.length ? (vals.reduce(function(a,b){{return a+b}},0) / vals.length).toFixed(1) : 0;
  }});

  var accent = "#f0a500";
  var textColor = "#888";
  var gridColor = "rgba(255,255,255,0.06)";

  new Chart(document.getElementById("eventsChart"), {{
    type: "line",
    data: {{
      labels: sortedDates,
      datasets: [{{ label: "Events", data: eventCounts, borderColor: accent, backgroundColor: accent + "33", fill: true, tension: 0.3, pointRadius: 3 }}]
    }},
    options: {{ responsive: true, maintainAspectRatio: false, plugins: {{ legend: {{ display: false }} }}, scales: {{ x: {{ ticks: {{ color: textColor, maxTicksLimit: 10 }}, grid: {{ color: gridColor }} }}, y: {{ ticks: {{ color: textColor }}, grid: {{ color: gridColor }}, beginAtZero: true }} }} }}
  }});

  var breakLabels = Object.keys(breakdownCounts);
  var breakValues = breakLabels.map(function(k) {{ return breakdownCounts[k]; }});
  new Chart(document.getElementById("breakdownChart"), {{
    type: "bar",
    data: {{
      labels: breakLabels,
      datasets: [{{ label: "Events", data: breakValues, backgroundColor: ["#f0a500","#e85d04","#9d0208","#370617","#6a040f","#03071e","#dc2f02","#ffba08","#0077b6","#00b4d8"] }}]
    }},
    options: {{ responsive: true, maintainAspectRatio: false, plugins: {{ legend: {{ display: false }} }}, scales: {{ x: {{ ticks: {{ color: textColor }}, grid: {{ color: gridColor }} }}, y: {{ ticks: {{ color: textColor }}, grid: {{ color: gridColor }}, beginAtZero: true }} }} }}
  }});

  new Chart(document.getElementById("latencyChart"), {{
    type: "line",
    data: {{
      labels: sortedDates,
      datasets: [{{ label: "Avg Latency (ms)", data: avgLatencies, borderColor: "#e85d04", backgroundColor: "#e85d0433", fill: true, tension: 0.3, pointRadius: 3 }}]
    }},
    options: {{ responsive: true, maintainAspectRatio: false, plugins: {{ legend: {{ display: false }} }}, scales: {{ x: {{ ticks: {{ color: textColor, maxTicksLimit: 10 }}, grid: {{ color: gridColor }} }}, y: {{ ticks: {{ color: textColor }}, grid: {{ color: gridColor }}, beginAtZero: true }} }} }}
  }});

  var tableBody = document.getElementById("brandTableBody");
  brands.forEach(function(slug) {{
    var d = detailed[slug];
    if (!d) return;
    var row = document.createElement("tr");
    row.innerHTML = "<td>" + slug + "</td><td>" + d.total_chats + "</td><td>" + d.total_leads + "</td><td>" + d.avg_latency_ms + "</td>";
    tableBody.appendChild(row);
  }});
}})();
</script>
</body>
</html>
