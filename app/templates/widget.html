<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{title} {assistant}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after {{ box-sizing: border-box; margin: 0; padding: 0; }}
  body {{ font-family: 'IBM Plex Sans', sans-serif; background: transparent; overflow: hidden; }}
  #rag-widget {{ position: fixed; bottom: 20px; right: 20px; z-index: 999999; display: flex; flex-direction: column; align-items: flex-end; }}
  #rag-widget.bn {{ width: {width}; height: {height}; }}
  #toggle-btn {{ width: 56px; height: 56px; border-radius: 50%; border: none; background: {accent_color}; color: #000; font-size: 26px; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,.5); transition: .2s; display: flex; align-items: center; justify-content: center; }}
  #toggle-btn:hover {{ transform: scale(1.08); }}
  #widget-box {{ display: none; width: 100%; height: 100%; flex-direction: column; background: {surface_color}; border: 1px solid {border_color}; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,.7); }}
  #widget-box.open {{ display: flex; }}
  #header {{ display: flex; align-items: center; gap: 10px; padding: 14px 16px; background: {bg_color}; border-bottom: 1px solid {border_color}; }}
  #header .brand-title {{ font-weight: 600; font-size: 15px; color: {text_color}; }}
  #header .brand-sub {{ font-size: 11px; color: {text_dim_color}; margin-top: -1px; }}
  #messages {{ flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; background: {bg_color}; }}
  #messages .msg {{ max-width: 88%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }}
  #messages .msg.user {{ align-self: flex-end; background: {user_bg_color}; color: {text_color}; border-bottom-right-radius: 4px; }}
  #messages .msg.bot {{ align-self: flex-start; background: {bot_bg_color}; color: {text_color}; border-bottom-left-radius: 4px; }}
  #messages .msg .src {{ font-size: 11px; color: {text_dim_color}; margin-top: 6px; }}
  .chat-input {{ display: flex; gap: 8px; padding: 10px 14px; background: {bg_color}; border-top: 1px solid {border_color}; }}
  .chat-input input {{ flex: 1; padding: 10px 14px; border-radius: 10px; border: 1px solid {border_color}; background: {surface_color}; color: {text_color}; font-size: 14px; outline: none; font-family: 'IBM Plex Sans', sans-serif; }}
  .chat-input input:focus {{ border-color: {accent_color}; }}
  .chat-input input::placeholder {{ color: {text_dim_color}; }}
  .chat-input button {{ padding: 10px 18px; border-radius: 10px; border: none; background: {accent_color}; color: #000; font-weight: 600; font-size: 14px; cursor: pointer; transition: .15s; }}
  .chat-input button:hover {{ opacity: .8; }}
  .chat-input button:disabled {{ opacity: .4; cursor: not-allowed; }}
  .feedback-row {{ display: flex; gap: 6px; margin-top: 4px; margin-bottom: 2px; }}
  .feedback-row button {{ background: none; border: 1px solid {border_color}; border-radius: 6px; padding: 4px 8px; font-size: 14px; cursor: pointer; color: {text_dim_color}; transition: .15s; }}
  .feedback-row button:hover {{ border-color: {accent_color}; color: {accent_color}; }}
  .feedback-thanks {{ font-size: 12px; color: {accent_color}; margin-top: 4px; }}
  .suggestions {{ display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }}
  .suggestions .chip {{ padding: 6px 14px; border-radius: 20px; border: 1px solid {border_color}; background: {surface_color}; color: {text_color}; font-size: 13px; cursor: pointer; transition: .15s; }}
  .suggestions .chip:hover {{ border-color: {accent_color}; color: {accent_color}; }}
  .citation-toggle {{ font-size: 12px; color: {accent_color}; cursor: pointer; margin-top: 4px; }}
  .citation-content {{ display: none; font-size: 12px; color: {text_dim_color}; margin-top: 4px; padding: 6px 8px; background: {surface_color}; border-radius: 6px; }}
  .citation-content.open {{ display: block; }}
  @keyframes dotPulse {{ 0%, 80%, 100% {{ opacity: 0; }} 40% {{ opacity: 1; }} }}
  .typing-dots {{ display: inline-flex; gap: 4px; padding: 4px 0; }}
  .typing-dots span {{ width: 8px; height: 8px; background: {text_dim_color}; border-radius: 50%; animation: dotPulse 1.4s ease-in-out infinite; }}
  .typing-dots span:nth-child(1) {{ animation-delay: 0s; }}
  .typing-dots span:nth-child(2) {{ animation-delay: .2s; }}
  .typing-dots span:nth-child(3) {{ animation-delay: .4s; }}
</style>
</head>
<body>
<div id="rag-widget" class="bn">
  <div id="widget-box" class="open">
    <div id="header">
      {logo_html}
      <div>
        <div class="brand-title">{title}</div>
        <div class="brand-sub">{powered_by}</div>
      </div>
    </div>
    <div class="messages" id="messages">
      <div class="msg bot">{welcome_message}</div>
    </div>
    <div class="chat-input">
      <input type="text" id="input" placeholder="{placeholder}" autocomplete="off"/>
      <button class="send-btn" id="send">{send}</button>
    </div>
  </div>
</div>
<script>
(function(){{
  var BRAND = "{brand}";
  var SESSION_ID = "sess_" + Date.now() + "_" + Math.random().toString(36).slice(2,8);
  var msgId = document.getElementById("messages");

  function addMsg(role, text, extra) {{
    var d = document.createElement("div");
    d.className = "msg " + role;
    d.innerHTML = text;
    if (extra) d.appendChild(extra);
    msgId.appendChild(d);
    msgId.scrollTop = msgId.scrollHeight;
  }}

  function addTyping() {{
    var d = document.createElement("div");
    d.className = "msg bot typing-dots";
    d.id = "typing";
    d.innerHTML = "<span></span><span></span><span></span>";
    msgId.appendChild(d);
    msgId.scrollTop = msgId.scrollHeight;
  }}

  function remTyping() {{
    var t = document.getElementById("typing");
    if (t) t.remove();
  }}

  function send() {{
    var inp = document.getElementById("input");
    var text = inp.value.trim();
    if (!text) return;
    inp.value = "";
    addMsg("user", text);
    addTyping();

    var ev = new EventSource?.(null);
    var xhr = new XMLHttpRequest();
    xhr.open("POST", "/api/" + BRAND + "/chat/stream");
    xhr.setRequestHeader("Content-Type", "application/json");
    xhr.responseType = "text";

    var lastIdx = 0;
    var answer = "";

    xhr.onprogress = function() {{
      var data = xhr.responseText.slice(lastIdx);
      lastIdx = xhr.responseText.length;
      var lines = data.split("\\n").filter(Boolean);
      for (var i = 0; i < lines.length; i++) {{
        var line = lines[i];
        if (line.startsWith("data: ")) {{
          try {{
            var d = JSON.parse(line.slice(6));
            if (d.token) {{
              answer += d.token;
              remTyping();
              var botEl = msgId.querySelector(".msg.bot:last-child");
              if (!botEl || botEl.classList.contains("typing-dots")) {{
                addMsg("bot", d.token);
              }} else {{
                botEl.textContent += d.token;
              }}
            }} else if (d.answer) {{
              remTyping();
              answer = d.answer;
              addMsg("bot", d.answer);
              if (d.sources && d.sources.length) {{
                var s = document.createElement("div");
                s.className = "src";
                s.textContent = "{sources} " + d.sources.join(", ");
                var lastBot = msgId.querySelector(".msg.bot:last-child");
                if (lastBot) lastBot.appendChild(s);
              }}
              var mId = d.message_id;
              if (mId) {{
                var fr = document.createElement("div");
                fr.className = "feedback-row";
                var up = document.createElement("button");
                up.textContent = "\\u1f44d";
                up.title = "{helpful}";
                up.onclick = function() {{ feedback(mId, 1, fr); }};
                var down = document.createElement("button");
                down.textContent = "\\u1f44e";
                down.title = "{not_helpful}";
                down.onclick = function() {{ feedback(mId, -1, fr); }};
                fr.appendChild(up);
                fr.appendChild(down);
                var lastBot2 = msgId.querySelector(".msg.bot:last-child");
                if (lastBot2) lastBot2.appendChild(fr);

                var suggestionsUrl = "/api/" + BRAND + "/suggestions/" + mId;
                pollSuggestions(suggestionsUrl, fr);
              }}
            }}
          }} catch(e) {{}}
        }}
      }}
    }};

    xhr.onloadend = function() {{
      remTyping();
    }};

    xhr.send(JSON.stringify({{ message: text, session_id: SESSION_ID, stream: true }}));
  }}

  document.getElementById("send").addEventListener("click", send);
  document.getElementById("input").addEventListener("keydown", function(e) {{ if (e.key === "Enter") send(); }});

  function feedback(msgId, rating, row) {{
    var xhr = new XMLHttpRequest();
    xhr.open("POST", "/api/" + BRAND + "/feedback");
    xhr.setRequestHeader("Content-Type", "application/json");
    xhr.onload = function() {{
      if (xhr.status === 200) {{
        row.innerHTML = '<span class="feedback-thanks">' + (rating === 1 ? "{feedback_thanks}" : "{feedback_improve}") + '</span>';
      }}
    }};
    xhr.send(JSON.stringify({{ message_id: msgId, rating: rating, session_id: SESSION_ID }}));
  }}

  function pollSuggestions(url, afterEl) {{
    var attempts = 0;
    var maxAttempts = 10;
    var interval = setInterval(function() {{
      attempts++;
      var xhr = new XMLHttpRequest();
      xhr.open("GET", url);
      xhr.onload = function() {{
        if (xhr.status === 200) {{
          try {{
            var data = JSON.parse(xhr.responseText);
            if (data.suggestions && data.suggestions.length) {{
              clearInterval(interval);
              var wrap = document.createElement("div");
              wrap.className = "suggestions";
              for (var i = 0; i < data.suggestions.length; i++) {{
                var chip = document.createElement("span");
                chip.className = "chip";
                chip.textContent = data.suggestions[i];
                chip.onclick = function() {{
                  document.getElementById("input").value = this.textContent;
                  send();
                }};
                wrap.appendChild(chip);
              }}
              afterEl.parentNode.appendChild(wrap);
            }}
          }} catch(e) {{}}
        }}
      }};
      xhr.send();
      if (attempts >= maxAttempts) clearInterval(interval);
    }}, 1500);
  }}

  window.addEventListener("error", function() {{
    addMsg("bot", "{network_error}");
  }});
}})();
</script>
</body>
</html>
